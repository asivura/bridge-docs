name: Issue Status Automation

on:
  issues:
    types: [opened, closed, reopened]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  manage-labels:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Add "status: new" label
        if: github.event.action == 'opened'
        run: gh issue edit ${{ github.event.issue.number }} --add-label "status: new" --repo ${{ github.repository }}

      - name: Remove status labels and add "status: verified" on close
        if: github.event.action == 'closed'
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "status: new" \
            --remove-label "status: in-progress" \
            --remove-label "status: qa-needed" \
            --repo ${{ github.repository }} 2>/dev/null || true
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "status: verified" \
            --repo ${{ github.repository }}

      - name: Set "status: in-progress" on reopen
        if: github.event.action == 'reopened'
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "status: verified" \
            --remove-label "status: new" \
            --repo ${{ github.repository }} 2>/dev/null || true
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "status: in-progress" \
            --repo ${{ github.repository }}

      - name: QA passed - set "status: verified"
        if: >
          github.event.action == 'created' &&
          github.event.issue.state == 'open' &&
          contains(github.event.comment.body, '[qa-pass]')
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "status: in-progress" \
            --remove-label "status: qa-needed" \
            --remove-label "status: new" \
            --repo ${{ github.repository }} 2>/dev/null || true
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "status: verified" \
            --repo ${{ github.repository }}

      - name: Request QA - set "status: qa-needed"
        if: >
          github.event.action == 'created' &&
          github.event.issue.state == 'open' &&
          contains(github.event.comment.body, '[qa-needed]')
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "status: in-progress" \
            --remove-label "status: new" \
            --repo ${{ github.repository }} 2>/dev/null || true
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "status: qa-needed" \
            --repo ${{ github.repository }}

      - name: Work started - set "status: in-progress"
        if: >
          github.event.action == 'created' &&
          github.event.issue.state == 'open' &&
          contains(github.event.comment.body, '[in-progress]')
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "status: new" \
            --remove-label "status: qa-needed" \
            --repo ${{ github.repository }} 2>/dev/null || true
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "status: in-progress" \
            --repo ${{ github.repository }}
