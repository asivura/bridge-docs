name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - name: Check if PDF sources changed
        id: pdf-check
        run: |
          PDF_DEPS="SYSTEM.md SAYC-SYSTEM.md SAYC-DIFFERENCES.md website/src/pages/print/ website/src/styles/print.css website/src/lib/markdown-parser.ts website/src/data/difference-explanations.ts website/src/data/types.ts website/src/data/index.ts"
          if git diff --name-only HEAD~1 -- $PDF_DEPS 2>/dev/null | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate PDFs
        if: steps.pdf-check.outputs.changed == 'true'
        working-directory: website
        run: |
          pip install weasyprint
          bash scripts/generate-pdfs.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
