name: Lint Commits & PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[a-z].*[^.]$
          subjectPatternError: |
            PR title must:
            - Start with lowercase after type
            - Not end with a period
            Example: "feat: add resources page"

  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install commitlint
        run: npm install --global @commitlint/cli @commitlint/config-conventional
      - name: Create commitlint config
        run: |
          echo "export default { extends: ['@commitlint/config-conventional'], rules: { 'header-max-length': [2, 'always', 72] } };" > commitlint.config.mjs
      - name: Lint commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
